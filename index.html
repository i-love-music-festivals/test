<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Loading...</title>
    
    <link rel="manifest" href="./manifest.json">
  
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:url" content="https://i-love-music-festivals.github.io/arabaki2026/">
    <meta property="og:image" content="">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="フェスタイムテーブル">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="">

    <link rel="apple-touch-icon" href="https://i-love-music-festivals.github.io/arabaki2026/icon.png">
    <link rel="icon" type="image/png" href="https://i-love-music-festivals.github.io/arabaki2026/icon.png">
    
    <link rel="stylesheet" href="./style.css">
</head>
    
<body>
    <div id="digitalClock">00:00:00</div>
    
    <a href="#" target="_blank" rel="noopener noreferrer" id="officialLink">
        </a>
    
    <div class="app-container">
        <header>
            <h1 id="appTitle"></h1>
            <div id="disclaimerContainer" class="disclaimer"></div>
            <div id="lastUpdated">Last Update: --/--/-- --:--</div> 
            
            <div class="search-container">
                <input type="text" id="artistSearchInput" placeholder="出演アーティストを検索（前方一致）..." autocomplete="off">
                <ul id="searchSuggestList" class="suggest-list"></ul>
            </div>

            <div class="tabs">
                <button class="tab-btn" id="btnDay1" onclick="switchTab('day1')"></button>
                <button class="tab-btn" id="btnDay2" onclick="switchTab('day2')"></button>
                <button class="tab-btn" id="btnFood" onclick="switchTab('food')">フード</button>
                <button class="tab-btn" id="btnMap" onclick="switchTab('map')">マップ</button>
                <button class="tab-btn" id="btnWeather" onclick="switchTab('weather')">天気</button>
                <button class="tab-btn" id="btnMemo" onclick="switchTab('memo')">メモ</button>
            </div>
        </header>

        <div id="timetableSection" class="content-section">
            <div class="scroll-container">
                <div class="stage-headers-wrapper" id="headerWrapper">
                    <div class="stage-header-empty"></div>
                    <div class="stage-header-list" id="stageHeaders"></div>
                </div>
                <div class="timetable-wrapper" id="ttWrapper" onscroll="syncScroll()">
                    <div class="time-col" id="timeCol"></div>
                    <div id="gridContainer">
                        <div class="current-time-line" id="currentTimeLine"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="foodSection" class="content-section">
            <h2 class="food-section-header">フードエリア一覧</h2>
            <div id="foodContainer"></div>
        </div>

        <div id="mapSection" class="content-section">
            <div class="map-wrapper" id="mapWrapper"></div>
            <div class="map-controls">
                <button class="zoom-btn" onclick="zoomMap(0.2)">＋</button>
                <button class="zoom-btn" onclick="zoomMap(-0.2)">－</button>
                <button class="zoom-btn zoom-btn-reset" onclick="resetZoom()">Reset</button>
            </div>
        </div>

        <div id="weatherSection" class="content-section">
            <div id="weatherOnlineContent" class="weather-content">
                <h2 class="weather-section-header">周辺の天気</h2>
                <div class="iframe-container">
                    <iframe src="https://weathernews.jp/onebox/tenki/spot/camp/02/9624686/" title="1時間毎の天気"></iframe>
                </div>
            </div>
            <div id="weatherOfflineContent" class="weather-offline-msg">
                <p>現在オフラインです。<br>天気情報を取得するにはインターネットの接続が必要です。</p>
            </div>
        </div>
        
        <div id="memoSection" class="content-section">
            <h2 class="memo-section-header">メモ</h2>
            <div class="memo-notice">
                ※注意点※<br>
                ・ブラウザの履歴データを消去するとメモも消えてしまいます。<br>
                ・他の端末との共有はできません。
            </div>
            <textarea id="memoTextArea" placeholder="ライブの感想やメモを自由に書き込めます。&#13;&#10;入力すると自動保存されます。"></textarea>
        </div>
    </div>

    <div id="searchModalOverlay" class="search-modal-overlay"></div>
    <div id="searchModal" class="search-modal">
        <div class="search-modal-header">
            <h3 id="searchModalTitle">検索結果</h3>
            <button id="searchModalClose" class="search-modal-close">×</button>
        </div>
        <div id="searchModalContent" class="search-modal-content"></div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
