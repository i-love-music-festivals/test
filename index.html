<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ARABAKI ROCK FEST.26 非公式アプリ</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111111">
    
    <meta property="og:title" content="ARABAKI ROCK FEST.26 非公式アプリ">
    <meta property="og:description" content="タイムテーブル、フード、エリアマップ等を確認できる非公式アプリです。">
    <meta property="og:url" content="https://i-love-music-festivals.github.io/arabaki2026/">
    <meta property="og:image" content="https://i-love-music-festivals.github.io/arabaki2026/arabaki2026.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="フェスタイムテーブル 非公式ガイド">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i-love-music-festivals.github.io/arabaki2026/arabaki2026.png">
    
    <link rel="apple-touch-icon" href="https://i-love-music-festivals.github.io/arabaki2026/icon.png">
    <link rel="icon" type="image/png" href="https://i-love-music-festivals.github.io/arabaki2026/icon.png">
    
    <link rel="stylesheet" href="./style.css">
</head>
    
<body>
    <div class="app-container">
        
        <div id="digitalClock"></div>
        
        <a target="_blank" rel="noopener noreferrer" id="officialLink"></a>
        
        <header>
            <h1 id="appTitle">フェス非公式ガイド</h1>
            <div id="disclaimerText" class="disclaimer"></div>
            <div id="lastUpdated"></div>
            
            <div class="search-container">
                <input type="text" id="artistSearchInput" autocomplete="off">
                <ul id="searchSuggestList" class="suggest-list"></ul>
            </div>

            <div class="tabs" id="tabContainer">
                <button class="tab-btn" id="btnFood"></button>
                <button class="tab-btn" id="btnMap"></button>
                <button class="tab-btn" id="btnWeather"></button>
                <button class="tab-btn" id="btnMemo"></button>
            </div>
        </header>

        <div id="timetableSection" class="content-section">
            <div class="scroll-container" id="ttScrollArea">
                <div class="stage-headers-wrapper" id="headerWrapper">
                    <div class="stage-header-empty"></div>
                    <div class="stage-header-list" id="stageHeaders"></div>
                </div>
                
                <div class="timetable-wrapper" id="ttWrapper">
                    <div class="time-col" id="timeCol"></div>
                    <div id="gridContainer"></div>
                </div>
            </div>
        </div>

        <div id="foodSection" class="content-section">
            <h2 class="food-section-header" id="foodHeader"></h2>
            <div id="foodContainer"></div>
            <div class="source-credit" id="foodSourceCredit"></div>
        </div>

        <div id="mapSection" class="content-section">
            <div class="map-wrapper" id="mapWrapper"></div>
            <div class="map-controls">
                <button class="zoom-btn" id="btnZoomIn"></button>
                <button class="zoom-btn" id="btnZoomOut"></button>
                <button class="zoom-btn" id="btnZoomReset"></button>
            </div>
            <div class="source-credit" id="mapSourceCredit"></div>
        </div>

        <div id="weatherSection" class="content-section">
            <div id="weatherOnlineContent" class="weather-content">
                <h2 class="weather-section-header" id="weatherTitle"></h2>
                <div class="iframe-container" id="weatherIframeContainer"></div>
                <div class="weather-link-notice" id="weatherNotice"></div>
            </div>
            <div id="weatherOfflineContent" class="weather-offline-msg"></div>
        </div>

        <div id="memoSection" class="content-section">
            <h2 class="memo-section-header" id="memoHeader"></h2>
            <div class="memo-notice" id="memoNotice"></div>
            <textarea id="memoTextArea"></textarea>
        </div>

    </div><div id="searchModalOverlay" class="search-modal-overlay"></div>
    <div id="searchModal" class="search-modal">
        <div class="search-modal-header">
            <h3 id="searchModalTitle"></h3>
            <button id="searchModalClose" class="search-modal-close"></button>
        </div>
        <div id="searchModalContent" class="search-modal-content"></div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
