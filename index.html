<head>

    <style>
        /* ==========================================
           CSS: 変数・基本設定
           レイアウトや各ステージのテーマカラーを定義します。
           ========================================== */
        :root {
            /* ステージカラー */
            --color-michinoku: #D4AF37;
            --color-arahabaki: #9932CC;
            --color-hatahata: #B0003A;
            --color-tsugaru: #8B8B00;
            --color-hanagasa: #E83929;
            --color-banetsu: #0077B6;
            --color-food: #E67E22;
            
            /* システムカラー・サイズ */
            --color-mytt: #444444;
            --bg-color: #ffffff;
            --grid-border: #e0e0e0;
            --text-color: #333;
            --time-width: 60px;   /* 時間軸の幅 */
            --col-width: 160px;   /* 各ステージ列の幅 */
            --px-per-min: 2;      /* 1分あたりの高さ(px) */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* スクロールは内部コンテナで行うためbodyは固定 */
        }

        /* ==========================================
           CSS: レイアウト構造
           アプリ全体の外枠とヘッダー、タブ切り替え部分のスタイル
           ========================================== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #111;
            color: white;
            padding: 10px;
            text-align: center;
            flex-shrink: 0;
            z-index: 100;
        }

        h1 { font-size: 16px; margin: 0 0 10px 0; }
        .disclaimer { font-size: 12px; margin-bottom: 10px; color: #ccc; }

        .tabs { display: flex; justify-content: center; gap: 5px; }
        .tab-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-btn.active { background-color: #D81B60; font-weight: bold; }

        .content-section { display: none; flex-grow: 1; overflow: hidden; }
        .content-section.active { display: flex; flex-direction: column; }

        /* ==========================================
           CSS: タイムテーブル表示エリア
           スクロール領域やステージヘッダー、時間軸、グリッドのスタイル
           ========================================== */
        .scroll-container { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        
        .stage-headers-wrapper {
            display: flex;
            overflow-x: hidden;
            flex-shrink: 0;
            border-bottom: 2px solid #333;
            background: #f9f9f9;
        }

        /* ヘッダー左端の空白（時間軸の上部） */
        .stage-header-empty {
            width: var(--time-width);
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid var(--grid-border);
            position: sticky;
            left: 0;
            z-index: 10;
        }

        .stage-header-list { display: flex; }
        
        .stage-header {
            width: var(--col-width);
            flex-shrink: 0;
            text-align: center;
            padding: 10px 5px;
            border-right: 1px solid var(--grid-border);
            box-sizing: border-box;
        }
        
        /* マイタイムテーブル列用のヘッダー（列が複数になっても1つのタイトルに結合） */
        .stage-header.mytt { width: auto; min-width: var(--col-width); background: #eee; }

        .stage-name {
            font-weight: bold;
            font-size: 14px; margin-bottom: 5px; color: #fff;
            padding: 4px; border-radius: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            display: block; text-decoration: none;
        }
        .stage-name.mytt { color: #333; text-shadow: none; background: #ccc; }

        .timetable-wrapper { display: flex; flex-grow: 1; overflow: auto; position: relative; }

        /* 時間軸 (左列) */
        .time-col {
            width: var(--time-width);
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid var(--grid-border);
            position: sticky;
            left: 0;
            z-index: 5;
        }

        .time-slot {
            height: calc(60 * var(--px-per-min) * 1px);
            box-sizing: border-box;
            border-bottom: 1px solid var(--grid-border);
            text-align: center;
            font-size: 12px;
            color: #666;
            position: relative;
        }
        .time-slot span { position: absolute; top: -8px; left: 5px; background: #fff; padding: 0 2px; }

        /* グリッド列 */
        .grid-col { width: var(--col-width); flex-shrink: 0; border-right: 1px dashed var(--grid-border); position: relative; }
        .grid-col.mytt { background-color: rgba(238, 238, 238, 0.3); }

        /* 10分刻みなどの背景ライン */
        .grid-bg-lines {
            position: absolute;
            inset: 0; pointer-events: none;
            background-size: 100% calc(60 * var(--px-per-min) * 1px);
            background-image: linear-gradient(to bottom, var(--grid-border) 1px, transparent 1px);
            z-index: 0;
        }

        /* ==========================================
           CSS: アーティスト＆フードブロック
           各予定を表示する四角いブロックのスタイル
           ========================================== */
        .artist-block {
            position: absolute;
            left: 2px; right: 2px; border-radius: 4px; padding: 4px;
            box-sizing: border-box; font-size: 11px; overflow: hidden; color: #fff;

            height: auto !important; 
            min-height: 116px;
            position: relative;
            margin-bottom: 4px;
            top: 0 !important;

        }

        .food-menu-list {

            padding: 0;

            padding: 4px;
            border-radius: 4px;
        }

        .shop-details { display: none; margin-top: 8px; }
        .food-shop.open .shop-details { display: block; }
        .shop-message {
            margin: 4px 0 0 0;
            font-size: 11px;
            color: #ffffee;
            border-top: 1px dashed rgba(255,255,255,0.3);
            padding-top: 4px;
            line-height: 1.3;
        }

        /* 再放送用の斜線背景 */
        .artist-block.is-replay {
            opacity: 0.85;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
        }

        /* お気に入り（スター）時のハイライト色変更 */
        .artist-block.favorited { border: 2px solid #FFD700 !important; box-shadow: 0 0 8px rgba(255, 215, 0, 0.8); z-index: 2; }

        .artist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; flex-shrink: 0; }
        .artist-time { font-weight: bold; font-size: 10px; }
        .artist-name { font-weight: 800; font-size: 13px; line-height: 1.1; margin-bottom: 2px; word-break: break-all; overflow-wrap: break-word; display: block; }
        .artist-meta { font-size: 9px; opacity: 0.9; flex-shrink: 0; }

        /* お気に入り登録ボタン（スター型） */
        .fav-btn { background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 0; line-height: 1; text-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .fav-btn.active { color: #FFD700; text-shadow: 0 0 3px rgba(0,0,0,0.8); }

        /* 現在時刻ライン */
        .current-time-line { position: absolute; left: 0; right: 0; height: 2px; background-color: red; z-index: 10; pointer-events: none; display: none; box-shadow: 0 0 5px red; }
        .current-time-line::before { content: ''; position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; background-color: red; border-radius: 50%; }

        /* 演奏中アニメーション */
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); border-color: red; }
            70% { box-shadow: 0 0 0 6px rgba(255, 0, 0, 0); border-color: #ff6b6b; }
        }
        .artist-block.playing { border: 3px solid red; animation: pulse-border 1.5s infinite; z-index: 3; }

        /* ==========================================
           CSS: マップセクション＆時計・更新日時
           ========================================== */
        #mapSection { background-color: #333; position: relative; overflow: auto; display: none; }
        #mapSection.active { display: block; }
        .map-wrapper { display: inline-block; min-width: 100%; min-height: 100%; text-align: center; padding: 20px; box-sizing: border-box; transform-origin: 0 0; }
        .area-map-img { max-width: 100%; height: auto; display: block; margin: 0 auto 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .map-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 110; }
        .zoom-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.7); color: white; border: 2px solid white; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #digitalClock {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFB100;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
            border: 1px solid #FFB100;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        /* 更新日時 */
        #lastUpdated {
            color: #ccc;
            font-size: 11px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

            e("KEIJU", "13:45", "14:30", "Hip Hop"),
            e("T.M.Revolution", "15:20", "16:05", "Pop"),

// ==========================================
// 【システム・ロジックエリア】
// 基本的にここのコードは変更不要です。UIや動作の処理を行います。
// ==========================================

// --- 状態管理・データ保存 ---
let currentDay = 1;
let favorites = JSON.parse(localStorage.getItem('arabaki_favs')) || {}; // ブラウザに保存されたお気に入りを読み込み
let mapScale = 1.0;

// お気に入りをローカルストレージに保存する関数
const saveFavorites = () => localStorage.setItem('arabaki_favs', JSON.stringify(favorites));

// お気に入り（スター）のON/OFFを切り替える関数
function toggleFav(id) {
    const decodedId = decodeURIComponent(id);
    favorites[decodedId] ? delete favorites[decodedId] : favorites[decodedId] = true;
    saveFavorites();
    renderTimetable(); // 状態が変わったら画面を再描画
}

// フード店のアコーディオン（開閉）を切り替える関数
function toggleFood(element) {
    element.classList.toggle('open');
}

// --- 時間・計算 ---
// 「HH:MM」の文字列を、START_HOURを起点とした「分」に変換する関数
function timeToMins(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    const adjustedH = h < START_HOUR ? h + 24 : h; // 深夜帯(0時〜)は24時間加算して処理
    return (adjustedH - START_HOUR) * 60 + m;
}

// 25:00等を「1:00」のように画面表示用にフォーマットする関数
function formatTimeDisplay(timeStr) {
    let [h, m] = timeStr.split(':').map(Number);
    if(h >= 24) h -= 24;
    return `${h}:${m.toString().padStart(2,'0')}`;
}

// --- UI操作 ---
// スクロール時にステージ名ヘッダーの位置を追従させる関数
function syncScroll() {
    const wrapper = document.getElementById('ttWrapper');
    document.getElementById('headerWrapper').scrollLeft = wrapper.scrollLeft;
}

// 日程やマップのタブを切り替える関数
function switchTab(target) {
    document.querySelectorAll('.tab-btn, .content-section').forEach(el => el.classList.remove('active'));
    if (target === 'map') {
        document.getElementById('btnMap').classList.add('active');
        document.getElementById('mapSection').classList.add('active');
    } else {
        currentDay = (target === 'day1') ? 1 : 2;
        document.getElementById(target === 'day1' ? 'btnDay1' : 'btnDay2').classList.add('active');
        document.getElementById('timetableSection').classList.add('active');
        renderTimetable();
    }
}

// --- 画面描画 ---
// タイムテーブル上部のステージ名を生成・表示する関数
function renderHeaders(myttCols) {
    let html = '';
    // マイタイムテーブルが複数列になっても結合された1つのタイトルとして表示
    if(myttCols > 0) {
        html += `<div class="stage-header mytt" style="width: calc(var(--col-width) * ${myttCols});">
                    <div class="stage-name mytt">マイタイムテーブル</div>
                 </div>`;
    }

    // 各ステージのヘッダー生成
    stagesInfo.forEach(stage => {
        const style = `style="background-color: ${stage.color}"`;
        html += `<div class="stage-header">
                    ${stage.url ? `<a href="${stage.url}" target="_blank" class="stage-name" ${style}>${stage.name}</a>` 
                                : `<div class="stage-name" ${style}>${stage.name}</div>`}
                 </div>`;
    });
    document.getElementById('stageHeaders').innerHTML = html;
}

// 1つの予定（アーティスト・フード等）の四角いブロックHTMLを生成する関数
function getArtistHtml(artist, stage, dayKey, isMyTT = false) {
    const startMin = timeToMins(artist.start);
    const endMin = timeToMins(artist.end);
    const duration = endMin - startMin;
    
    // 1. フードセクションの場合の専用HTML生成
    if(stage.id === 'food') {
        const shopsHtml = artist.menu.map(shop => {
            const menuItems = shop.menus.map(m => `<li style="margin-left:10px;">● ${m}</li>`).join('');
            const messageHtml = shop.message.replace(/\n/g, '<br>');
            return `
            <div class="food-shop" onclick="event.stopPropagation(); this.classList.toggle('open')">
                <div class="shop-name">▼ ${shop.name}</div>
                <div class="shop-details">
                    <ul style="margin:0; padding:0; list-style:none;">${menuItems}</ul>
                    <p class="shop-message">${messageHtml}</p>
                </div>
            </div>`;
        }).join('');

        return `
            <div class="artist-block food-block" style="background-color:${stage.color};" onclick="toggleFood(this)">
                <div class="artist-name" style="margin:0; font-size:13px; font-weight:bold;">▼ ${artist.name}</div>
                <div class="food-menu-list">${shopsHtml}</div>
            </div>`;
    }

    // 2. 通常のアーティストブロックの処理
    const cleanName = artist.name.replace(/<[^>]*>/g, '').replace(/[^a-zA-Z0-9ぁ-んァ-ヶー一-龠]/g, '');
    const favId = `${dayKey}_${stage.id}_${cleanName}`;
    const isFav = favorites[favId];
    
    // 背景色を少し薄くする特定のイベント群
    const lighterNames = ["川崎中学校吹奏楽部", "町長挨拶", "藤原美幸", "みちのくプロレス", "西馬音内盆踊り", "Cha'R", "夢弦会", "Lexulty"];
    const boxBgColor = lighterNames.some(t => artist.name.includes(t)) ? `${stage.color}b3` : stage.color;

    // 現在演奏中かどうかの判定
    let isPlaying = false;
    const now = new Date();
    const dataDate = new Date(timetableData[dayKey].date);
    const isToday = now.toDateString() === dataDate.toDateString();
    const isNextDayEarly = now.getHours() < START_HOUR && now.getDate() === dataDate.getDate() + 1;
    
    if (isToday || isNextDayEarly) {
        const currentMins = (now.getHours() + (isNextDayEarly ? 24 : 0) - START_HOUR) * 60 + now.getMinutes();
        if(currentMins >= startMin && currentMins < endMin) isPlaying = true;
    }

    const classes = ['artist-block', artist.isReplay && 'is-replay', isFav && 'favorited', isPlaying && 'playing'].filter(Boolean).join(' ');
    const escapedFavId = encodeURIComponent(favId);

    const isMayorGreeting = artist.name === "町長挨拶";
    const isSpecialArtist = artist.name.includes("藤原美幸") || artist.name.includes("夢弦会");
    const isEventNoGenre = artist.name.includes("みちのくプロレス") || artist.name.includes("西馬音内盆踊り") || artist.name.includes("トークセッション") || artist.name.includes("おとどけチーたくん高速バンド");

    // 特殊な短いイベント用の簡易表示フォーマット
    if (isMayorGreeting || isSpecialArtist) {
        const displayTime = isMayorGreeting ? "12:00-" : `${formatTimeDisplay(artist.start)}-`;
        return `<div class="${classes}" style="top:${startMin*2}px; height:${duration*2}px; background-color:${boxBgColor}; flex-direction:row; align-items:center; gap:4px;">
                    <span class="artist-time" style="margin:0;">${displayTime}</span>
                    <span class="artist-name" style="margin:0; font-size:11px; white-space:nowrap;"> ${artist.name}</span>
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${escapedFavId}')" style="margin-left:auto;">★</button>
                </div>`;
    }

    // 通常のアーティスト表示フォーマット
    const displayGenre = (isEventNoGenre) ? "" : (artist.genre || "");
    const timeText = isEventNoGenre ? `${formatTimeDisplay(artist.start)}-` : `${formatTimeDisplay(artist.start)}-${formatTimeDisplay(artist.end)}`;

    return `<div class="${classes}" style="top:${startMin*2}px; height:${duration*2}px; background-color:${boxBgColor};">
                <div class="artist-top">
                    <span class="artist-time">${timeText}</span>
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${escapedFavId}')">★</button>
                </div>
                <div class="artist-name">${artist.name}</div>
                <div class="artist-meta">${displayGenre}${isMyTT ? `<br>[${stage.name}]` : ''}</div>
            </div>`;
}

// ブロックの大きさに合わせてアーティスト名の文字サイズを自動調整する関数
function adjustFontSize() {
    document.querySelectorAll('.artist-block:not(.food-block)').forEach(block => {
        const nameEl = block.querySelector('.artist-name');
        const timeEl = block.querySelector('.artist-time');
        if (!nameEl) return;

        const isRow = block.style.flexDirection === 'row';
        let fontSize = isRow ? 11 : (nameEl.innerText === "" ? 11 : 13);
        const targetEl = (isRow || nameEl.innerText !== "") ? nameEl : timeEl;

        targetEl.style.fontSize = fontSize + 'px';
        // 枠からはみ出ている場合は文字を少しずつ小さくする
        while ((block.scrollHeight > block.offsetHeight || (isRow && nameEl.scrollWidth > nameEl.offsetWidth)) && fontSize > 7) {
            fontSize -= 0.5;
            targetEl.style.fontSize = fontSize + 'px';
        }
    });
}

// タイムテーブル全体（時間枠・グリッド・アーティスト）を描画するメイン関数
function renderTimetable() {
    const dayKey = `day${currentDay}`;
    const data = timetableData[dayKey];
    
    // 1. 時間軸の生成
    let timeHtml = '';
    for(let h = START_HOUR; h <= END_HOUR; h++) {
        timeHtml += `<div class="time-slot"><span>${h >= 24 ? h-24 : h}:00</span></div>`;
    }
    document.getElementById('timeCol').innerHTML = timeHtml;

    // 2. マイタイムテーブル（お気に入り）の抽出と列計算
    let myTtItems = [];
    stagesInfo.forEach(stage => {
        if(stage.id === 'food') return; // フードはお気に入り対象外
        (data[stage.id] || []).forEach(artist => {
            const cleanName = artist.name.replace(/<[^>]*>/g, '').replace(/[^a-zA-Z0-9ぁ-んァ-ヶー一-龠]/g, '');
            if(favorites[`${dayKey}_${stage.id}_${cleanName}`]) myTtItems.push({ artist, stage });
        });
    });
    myTtItems.sort((a,b) => timeToMins(a.artist.start) - timeToMins(b.artist.start));

    let myTtColumns = [[]]; 
    myTtItems.forEach(item => {
        let placed = false;
        // 時間が被らないように列を分ける処理
        for(let col of myTtColumns) {
            const overlap = col.some(ex => {
                return Math.max(timeToMins(item.artist.start), timeToMins(ex.artist.start)) < 
                       Math.min(timeToMins(item.artist.end), timeToMins(ex.artist.end));
            });
            if(!overlap) { col.push(item); placed = true; break; }
        }
        if(!placed) myTtColumns.push([item]);
    });
    
    const myTtColCount = myTtItems.length ? myTtColumns.length : 0;
    renderHeaders(myTtColCount);

    // 3. グリッドとアーティストブロックの配置
    let gridHtml = '';
    
    // マイタイムテーブル部分の描画
    if(myTtColCount > 0) {
        myTtColumns.forEach(col => {
            gridHtml += `<div class="grid-col mytt"><div class="grid-bg-lines"></div>${col.map(i => getArtistHtml(i.artist, i.stage, dayKey, true)).join('')}</div>`;
        });
    }

    // 全ステージ部分の描画
    stagesInfo.forEach(stage => {
        const content = (data[stage.id] || []).map(a => getArtistHtml(a, stage, dayKey)).join('');
        gridHtml += `<div class="grid-col"><div class="grid-bg-lines"></div>${content}</div>`;
    });
    
    // 現在時刻ライン用の要素追加
    gridHtml += `<div class="current-time-line" id="currentTimeLine"></div>`;
    document.getElementById('gridContainer').innerHTML = gridHtml;
    
    updateCurrentTimeLine();
    adjustFontSize();
}

// 現在時刻を示す赤いラインの位置を更新する関数
function updateCurrentTimeLine() {
    const line = document.getElementById('currentTimeLine');
    if(!line) return;

    const now = new Date();
    const dayKey = `day${currentDay}`;
    const dataDate = new Date(timetableData[dayKey].date);
    const isNextDayEarly = now.getHours() < START_HOUR && now.getDate() === dataDate.getDate() + 1;
    
    // 表示している日付と今日が一致している場合のみラインを表示
    if (now.toDateString() === dataDate.toDateString() || isNextDayEarly) {
        const currentMins = (now.getHours() + (isNextDayEarly ? 24 : 0) - START_HOUR) * 60 + now.getMinutes();
        const maxMins = (END_HOUR - START_HOUR) * 60;

        if(currentMins >= 0 && currentMins <= maxMins) {
            line.style.display = 'block';
            line.style.top = `${currentMins * 2}px`;
            return;
        }
    }
    line.style.display = 'none';
}

// --- マップ操作 ---
// マップの拡大・縮小処理
function zoomMap(delta) {
    mapScale = Math.min(Math.max(0.5, mapScale + delta), 3.0);
    document.getElementById('mapWrapper').style.transform = `scale(${mapScale})`;
}

// マップのズームリセット
function resetZoom() {
    mapScale = 1.0;
    document.getElementById('mapWrapper').style.transform = `scale(1)`;
}


// --- アプリ初期起動処理 ---
renderTimetable(); // 初回描画
setInterval(updateCurrentTimeLine, 60000); // 1分ごとに現在時刻ラインを更新

// --- Service Worker (オフラインキャッシュ機能) ---
// 電波の悪い会場でも動作するようにキャッシュを保存する機能
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const swCode = `
            const CACHE_NAME = 'arabaki-cache-v1';
            const urlsToCache = [
                location.href,
                'https://arabaki.com/share/img/area/hsyrahrus/dl/arabaki26_areamap_ver02.jpg',
                'https://arabaki.com/share/img/area/tentarea_26_dl.jpg?20260413'
            ];

            self.addEventListener('install', event => {
                event.waitUntil(
                    caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
                );
            });

            self.addEventListener('fetch', event => {
                event.respondWith(
                    caches.match(event.request).then(response => {
                        if (response) return response; // キャッシュがあれば返す
                        return fetch(event.request).then(fetchRes => {
                            if (!fetchRes || fetchRes.status !== 200 || fetchRes.type !== 'basic') {
                                return fetchRes;
                            }
                            const responseToCache = fetchRes.clone();
                            caches.open(CACHE_NAME).then(cache => {
                                cache.put(event.request, responseToCache);
                            });
                            return fetchRes;
                        }).catch(() => {
                            // オフラインかつキャッシュがない場合の処理
                        });
                    })
                );
            });
        `;
        // BlobURLを用いて単一ファイル内でServiceWorkerを完結させる手法
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);

        navigator.serviceWorker.register(swUrl)
            .then(reg => console.log('ServiceWorker registered successfully. (Offline mode ready)'))
            .catch(err => console.log('ServiceWorker registration failed or restricted by iframe: ', err));
    });
}

// --- デジタル時計の表示処理 ---
function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    
    const clockElement = document.getElementById('digitalClock');
    if (clockElement) {
        clockElement.textContent = `${h}:${m}:${s}`;
    }
}
setInterval(updateClock, 1000); // 1秒ごとに更新
updateClock(); // 初回実行

// --- 最終更新日時の表示処理 ---
function displayLastModified() {
    const lastMod = new Date(document.lastModified);
    const y = lastMod.getFullYear();
    const m = String(lastMod.getMonth() + 1).padStart(2, '0');
    const d = String(lastMod.getDate()).padStart(2, '0');
    const hh = String(lastMod.getHours()).padStart(2, '0');
    const mm = String(lastMod.getMinutes()).padStart(2, '0');

    const lastUpdatedElement = document.getElementById('lastUpdated');
    if (lastUpdatedElement) {
        lastUpdatedElement.textContent = `更新日時：${y}/${m}/${d} ${hh}:${mm}`;
    }
}
window.addEventListener('load', displayLastModified); // ページ読み込み時に実行
