<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8\">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABAKI ROCK FEST.26</title>
    
    <link rel="manifest" href="./manifest.json">
  
    <meta property="og:title" content="非公式アプリ">
    <meta property="og:description" content="タイムテーブル、フード、エリアマップ等を確認できる非公式アプリです。">
    <meta property="og:url" content="https://i-love-music-festivals.github.io/arabaki2026/">
    <meta property="og:image" content="https://i-love-music-festivals.github.io/arabaki2026/arabaki2026.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="フェスタイムテーブル 非公式ガイド">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i-love-music-festivals.github.io/arabaki2026/arabaki2026.png">

    <link rel="apple-touch-icon" href="https://i-love-music-festivals.github.io/arabaki2026/icon.png">
    <link rel="icon" type="image/png" href="https://i-love-music-festivals.github.io/arabaki2026/icon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1 id="festivalName">ARABAKI ROCK FEST.26<br>非公式アプリ</h1>
                <div class="header-controls">
                    <button id="searchBtn" class="icon-btn">🔍</button>
                    <div id="digitalClock" class="clock">00:00:00</div>
                </div>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="day1" id="tabDay1">4/25 (土)</button>
                <button class="tab-btn" data-tab="day2" id="tabDay2">4/26 (日)</button>
                <button class="tab-btn" data-tab="food">FOOD</button>
                <button class="tab-btn" data-tab="map">MAP</button>
                <button class="tab-btn" data-tab="weather">天気</button>
                <button class="tab-btn" data-tab="memo">メモ</button>
            </nav>
        </header>

        <main id="mainContent">
            <div id="day1" class="content-section active timetable-section">
                <div class="timetable-container" id="timetableContainerDay1">
                    <div class="time-column" id="timeColumnDay1"></div>
                    <div class="stages-wrapper" id="stagesWrapperDay1"></div>
                </div>
            </div>
            <div id="day2" class="content-section timetable-section">
                <div class="timetable-container" id="timetableContainerDay2">
                    <div class="time-column" id="timeColumnDay2"></div>
                    <div class="stages-wrapper" id="stagesWrapperDay2"></div>
                </div>
            </div>

            <div id="foodSection" class="content-section">
                <div class="food-filter-bar">
                    <button class="food-area-toggle active" data-area="all">すべて</button>
                    <button class="food-area-toggle" data-area="fav">お気に入り</button>
                    <div id="foodAreaButtons"></div>
                </div>
                <div id="foodGrid" class="food-grid"></div>
            </div>

            <div id="mapSection" class="content-section">
                <div class="map-zoom-controls">
                    <button id="zoomIn">＋ 拡大</button>
                    <button id="zoomOut">－ 縮小</button>
                    <button id="zoomReset">リセット</button>
                </div>
                <div class="map-scroll-container" id="mapContainer">
                    <img src="https://i-love-music-festivals.github.io/arabaki2026/map.png" alt="エリアマップ" class="map-image" id="mapImage">
                </div>
            </div>

            <div id="weatherSection" class="content-section weather-section">
                <div id="weatherOnlineContent">
                    <iframe src="https://weathernews.jp/onebox/tenki/spot/camp/02/9624686/" title="1時間毎の天気"></iframe>
                </div>
                <div class="weather-link-notice">
                    ※サイト側のセキュリティ制限等でうまく表示されない場合は、<br>
                    <a href="https://weathernews.jp/onebox/tenki/spot/camp/02/9624686/" target="_blank" rel="noopener noreferrer">こちらからウェザーニュースを開いて</a>ご確認ください。
                </div>
            </div>
            
            <div id="memoSection" class="content-section">
                <h2 class="memo-section-header">メモ</h2>
                <div class="memo-notice">
                    ※注意点※<br>
                    ・ブラウザのキャッシュ（履歴データ）クリアを行うと、マイタイムテーブル等を含めてメモの内容も消えてしまいます。<br>
                    ・他のデバイス（スマホからPCなど）への共有はできません。
                </div>
                <textarea id="memoTextArea" placeholder="ライブの感想やメモを自由に書き込めます。&#13;&#10;入力すると自動保存されます。"></textarea>
            </div>
        </main>
    </div>

    <div id="searchModalOverlay" class="search-modal-overlay"></div>
    <div id="searchModal" class="search-modal">
        <div class="search-modal-header">
            <h3>アーティスト検索</h3>
            <button id="closeSearchBtn">×</button>
        </div>
        <div class="search-input-wrapper">
            <input type="text" id="searchInput" placeholder="アーティスト名を入力...">
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    // サイトにアクセスするたびに、sw.jsに更新がないかチェックする
                    registration.update();
                    console.log('SW registered:', registration.scope);
                }).catch(err => {
                    console.error('SW registration failed:', err);
                });
            });

            // 新しいService Workerが動き出したら、こっそりページをリロードせずに
            // 次回のアクセスから最新版が適用されるようにする設定（今回はユーザー通知なし）
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    // 必要ならここで location.reload() できますが、
                    // ユーザーの入力を邪魔しないよう、今回は何もしません。
                }
            });
        }
    </script>
</body>
</html>
